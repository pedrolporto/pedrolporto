<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Pedro Porto — Analista de Desenvolvimento I</title>
  <desc id="desc">Backend, integrações, Oracle, Node.js e sistemas hospitalares</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#102a43"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <circle cx="1040" cy="70" r="170" fill="#38bdf8" fill-opacity="0.07"/>
  <circle cx="1110" cy="300" r="230" fill="#2dd4bf" fill-opacity="0.08"/>

  <g opacity="0.75">
    <rect x="860" y="74" width="250" height="210" rx="20" fill="#08111f" fill-opacity="0.42" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="898" cy="111" r="7" fill="#fb7185"/>
    <circle cx="922" cy="111" r="7" fill="#fbbf24"/>
    <circle cx="946" cy="111" r="7" fill="#34d399"/>
    <text x="894" y="160" fill="#7dd3fc" font-family="Consolas, Menlo, monospace" font-size="19">const impact = {</text>
    <text x="918" y="196" fill="#e2e8f0" font-family="Consolas, Menlo, monospace" font-size="18">software,</text>
    <text x="918" y="229" fill="#e2e8f0" font-family="Consolas, Menlo, monospace" font-size="18">data,</text>
    <text x="918" y="262" fill="#5eead4" font-family="Consolas, Menlo, monospace" font-size="18">healthcare</text>
    <text x="894" y="296" fill="#7dd3fc" font-family="Consolas, Menlo, monospace" font-size="19">};</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="74" y="64" width="74" height="8" rx="4" fill="url(#accent)"/>
    <text x="74" y="135" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1">Pedro Porto</text>
    <text x="77" y="184" fill="#bae6fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="600">Analista de Desenvolvimento I</text>
    <text x="77" y="232" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Backend  •  Integrações  •  Oracle  •  Node.js</text>
    <text x="77" y="276" fill="#99f6e4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Sistemas hospitalares e transformação digital</text>
    <text x="77" y="320" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Londrina · trabalho híbrido  |  Brasil · trabalho remoto</text>
  </g>
</svg>
